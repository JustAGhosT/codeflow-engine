name: Monorepo CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: python -m pip install poetry
      - name: Install engine dependencies
        run: poetry install --with dev --no-interaction
      - name: Validate engine package
        run: poetry run python -m compileall codeflow_engine

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        run: npm ci
      - name: Build desktop frontend
        run: npm run build

  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - name: Install website dependencies
        run: npm ci
      - name: Lint website
        run: npm run lint
      - name: Test website
        run: npm test
      - name: Build website
        run: npm run build

  orchestration-utils:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestration/packages/@codeflow/utils
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orchestration/packages/@codeflow/utils/package-lock.json
      - name: Install orchestration utility dependencies
        run: npm install
      - name: Build orchestration utilities
        run: npm run build

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install extension dependencies
        run: npm ci
      - name: Build extension
        run: npm run build
