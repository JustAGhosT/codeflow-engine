name: Monorepo CI

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'engine/**'
      - 'desktop/**'
      - 'website/**'
      - 'orchestration/**'
      - 'vscode-extension/**'
      - '.github/workflows/monorepo-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'engine/**'
      - 'desktop/**'
      - 'website/**'
      - 'orchestration/**'
      - 'vscode-extension/**'
      - '.github/workflows/monorepo-ci.yml'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      desktop: ${{ steps.filter.outputs.desktop }}
      website: ${{ steps.filter.outputs.website }}
      orchestration_utils: ${{ steps.filter.outputs.orchestration_utils }}
      vscode_extension: ${{ steps.filter.outputs.vscode_extension }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed components
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            engine:
              - 'engine/**'
              - '.github/workflows/monorepo-ci.yml'
            desktop:
              - 'desktop/**'
              - '.github/workflows/monorepo-ci.yml'
            website:
              - 'website/**'
              - '.github/workflows/monorepo-ci.yml'
            orchestration_utils:
              - 'orchestration/packages/@codeflow/utils/**'
              - '.github/workflows/monorepo-ci.yml'
            vscode_extension:
              - 'vscode-extension/**'
              - '.github/workflows/monorepo-ci.yml'

  engine:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.engine == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: python -m pip install poetry
      - name: Install engine dependencies
        run: poetry install --with dev --no-interaction
      - name: Validate engine package
        run: poetry run python -m compileall codeflow_engine

  desktop:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        run: npm ci
      - name: Build desktop frontend
        run: npm run build

  website:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.website == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - name: Install website dependencies
        run: npm ci
      - name: Lint website
        run: npm run lint
      - name: Test website
        run: npm test
      - name: Build website
        run: npm run build

  orchestration-utils:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.orchestration_utils == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: orchestration/packages/@codeflow/utils
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install orchestration utility dependencies
        run: npm install
      - name: Build orchestration utilities
        run: npm run build

  vscode-extension:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.vscode_extension == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install extension dependencies
        run: npm ci
      - name: Build extension
        run: npm run build
